    <script>
      'use strict' //Enables strict mode is JavaScript
      let url = new URL(document.location.href)
      let gc_region = url.searchParams.get('gc_region')
      let gc_clientId = url.searchParams.get('gc_clientId')
      let gc_redirectUrl = url.searchParams.get('gc_redirectUrl')
      let gc_conversationId = url.searchParams.get('gc_conversationId')
      let userId
      let attributestoparse = ["breadcrumbs"];

      //Getting and setting the GC details from dynamic URL and session storage
      gc_region ? sessionStorage.setItem('gc_region', gc_region) : gc_region = sessionStorage.getItem('gc_region')
      gc_clientId ? sessionStorage.setItem('gc_clientId', gc_clientId) : gc_clientId = sessionStorage.getItem('gc_clientId')
      gc_redirectUrl ? sessionStorage.setItem('gc_redirectUrl', gc_redirectUrl) : gc_redirectUrl = sessionStorage.getItem('gc_redirectUrl')
      gc_conversationId ? sessionStorage.setItem('gc_conversationId', gc_conversationId) : gc_conversationId = sessionStorage.getItem('gc_conversationId')

      let platformClient = require('platformClient')
      const client = platformClient.ApiClient.instance
      const uapi = new platformClient.UsersApi()
      const napi = new platformClient.NotificationsApi()
      const capi = new platformClient.ConversationsApi()
      let conversationEvents = [];
      let participants = [];

      async function start() {
        try {
          client.setEnvironment(gc_region)
          client.setPersistSettings(true, '_mm_')

          console.log('%cLogging in to Genesys Cloud', 'color: green')
          await client.loginImplicitGrant(gc_clientId, gc_redirectUrl, {})

          //GET Current UserId
          let user = await uapi.getUsersMe({})
          console.log(user)
          userId = user.id

          
         

        } 
        catch {
          console.log("Error Starting")
        }
      } //End of start() function


      async function parseConversation() 
      {
      
          //get conversation id
          let convID = document.getElementById("conversationID").value;
          conversationEvents = []
          
        // Get conversation
        capi.getConversation(convID)
          .then((data) => {
            console.log(`%cgetConversation success! data: ${JSON.stringify(data, null, 2)}`,'color: green');
            document.getElementById("jsonDisplay").innerHTML = JSON.stringify(data, null, 2);


            createEvent(data.startTime,"001",`Conversation Started - Address = ${data.address}`,"Conversation Model","--","--");
            createEvent(data.endTime,"999",`Conversation Ended - Address = ${data.address}`,"Conversation Model","--","--");
            

            for (const participant of data.participants) {
              
              createEvent(participant.startTime,"002",`Participant Entered - ${participant.purpose}`,"Conversation Model",participant.name,participant.participantType);
              createEvent(participant.endTime,"003",`Participant Exited - ${participant.purpose}`,"Conversation Model",participant.name,participant.participantType);

              
              //Look for our breadcrumb attribute here -- 


              //look for our calls
              for (const call of participant.calls) {
                createEvent(call.connectedTime,"004",`Call Media Started - ${participant.purpose}`,"Conversation Model",participant.name,participant.participantType);
                createEvent(call.disconnectedTime,"005",`Call Media Ended - ${participant.purpose}`,"Conversation Model",participant.name,participant.participantType);

                for (const segment of call.segments) {
                  createEvent(segment.startTime,"008",`Call Segment Started - ${segment.type}`,"Conversation Model",participant.name,participant.participantType);

                  if (segment.howEnded == "Disconnect"){
                    createEvent(segment.endTime,"009",`Call Segment Ended - SegmentType: ${segment.type} - Reason: ${segment.howEnded} - Disconnect Type: ${segment.disconnectType}`,"Conversation Model",participant.name,participant.participantType);
                  }
                  else if (segment.howEnded) {
                    createEvent(segment.endTime,"009",`Call Segment Ended - SegmentType: ${segment.type} - Reason: ${segment.howEnded}`,"Conversation Model",participant.name,participant.participantType);
                  }
                  else {
                    createEvent(segment.endTime,"009",`Call Segment Ended - SegmentType: ${segment.type}`,"Conversation Model",participant.name,participant.participantType);
                  }
                }

              }

              if (participant.purpose === 'customer')
              {
                for (const attribute in participant.attributes)
                  {
                      if (attributestoparse.includes(attribute))
                      {
                        let eventList = participant.attributes[attribute].split("|")

                        for (let index = 0; index < eventList.length; index++) {
                          const element = eventList[index];
                          createEvent(`---${((index < 10) ? "0" + index.toString() :  index.toString())}`,"---",element,attribute,"---","---");
                        }
                        
                          
                      }

                    }
                  }
              

            }
            
            

            //get some agent data we will need
           /*  let agentParticipant = data.participants.slice().reverse().find(p => p.purpose === 'agent');
            gc_agentParticipantId = agentParticipant.id

            let customerAttributes = data.participants.slice().find(p => p.purpose === 'customer').attributes;
          
            if (customerAttributes.speaker_language)
            {
              setSourceLanguage(customerAttributes.speaker_language);
            }
            if (customerAttributes.ADDI_TransactionId)
            {
              currentTransaction = customerAttributes.ADDI_TransactionId;
              document.getElementById("span_transactionId").innerText=currentTransaction;
              subscribeADDITranscription();
              ADDI_getActiveTransactionLanguage();
            }
            
            
            if ( agentParticipant.messages.length > 0)
            {
              gc_agentCommunicationId = agentParticipant.messages[0].id;
              gc_mediaType = "MESSAGE";
              document.getElementById("footer").style.visibility = "visible";
              document.getElementById("delayDiv").style.visibility = "hidden";

              let customerMessages = data.participants.slice().find(p => p.purpose === 'customer').messages;
              let agentMessages = data.participants.slice().reverse().find(p => p.purpose === 'agent').messages;
              let workflowMessages = data.participants.slice().reverse().find(p => p.purpose === 'workflow').messages;
              console.log(customerMessages[0].messages);
              TranslateExistingConversation(customerMessages[0].messages, agentMessages[0].messages,workflowMessages[0].messages);

            }
            else if (agentParticipant.calls.length > 0)
            {
              gc_agentCommunicationId = agentParticipant.calls[0].id;
              gc_mediaType = "VOICE"
              document.getElementById("footer").style.visibility = "visible";
              document.getElementById("delayDiv").style.visibility = "hidden";
              //document.getElementById("footer").style.visibility = "hidden";
            }
            else {
              gc_mediaType = "OTHER"
              document.getElementById("footer").style.visibility = "visible";
              document.getElementById("delayDiv").style.visibility = "hidden";
              //document.getElementById("footer").style.visibility = "hidden";
            }

            
            console.log(`%cThe agent participant id is ${gc_agentParticipantId}.  The media type is ${gc_mediaType}.  The communication id is ${gc_agentCommunicationId}`,'color: green')
            document.getElementById('span_communication').innerText = gc_agentCommunicationId;
                document.getElementById('span_participant').innerText = gc_agentParticipantId;
                document.getElementById('span_media').innerText = gc_mediaType;

            //let customerParticipant = data.participants.slice().reverse().find(p => p.purpose === 'customer');
 */
            conversationEvents.sort((a, b) => new Date(a.eventTime).getTime() - new Date(b.eventTime).getTime());
            createParticipantTable(data.participants)
          createEventTable(conversationEvents)
          
                      
          })
          .catch((err) => {
            console.log("%cThere was a failure calling getConversation",'color: red');
            console.error(err);
          });
}


function createEvent(eventTime,eventId,eventDetail,eventSource,eventParticipant,eventParticipantType)
{
  let ourEvent = 
            {
              "eventTime":eventTime,
              "eventID":eventId,
              "eventDetail":eventDetail,
              "eventParticipant":eventParticipant,
              "eventParticipantType":eventParticipantType,
              "eventSource":eventSource
            }

            conversationEvents.push(ourEvent);
}

     function ascending( a, b ) {
      if ( a.textContent < b.textContent ){
        return -1;
      }
      if ( a.textContent > b.textContent ){
        return 1;
      }
      return 0;
    }


    function filterTable() {
  // Declare variables
      var input, filter, table, tr, td, i, txtValue;
      input = document.getElementById("myInput");
      filter = input.value.toUpperCase();
      table = document.getElementById("logTable");
      tr = table.getElementsByTagName("tr");

      // Loop through all table rows, and hide those who don't match the search query
      for (i = 1; i < tr.length; i++) {
        //td = tr[i].getElementsByTagName("td")[0];
        let show = false;
        for (const td of tr[i].getElementsByTagName("td")){
          if (td) {
            txtValue = td.textContent || td.innerText;
            if (txtValue.toUpperCase().indexOf(filter) > -1) {
              show = true;
              break;
            } 
          }
        }

        //hide or show row
        if (show) {
              tr[i].style.display = "";
            } else {
              tr[i].style.display = "none";
            }

      }
    }
