<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent PostMessage Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #16213e;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #e94560;
    }
    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    button {
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #1a5276;
      padding: 5px 12px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    button:hover { background: #1a5276; }
    button.active { background: #e94560; border-color: #e94560; }
    .status {
      font-size: 11px;
      color: #888;
      padding: 0 8px;
    }
    .status .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
      margin-right: 4px;
      vertical-align: middle;
    }
    .status .dot.listening { background: #2ecc71; }
    .status .dot.subscribed { background: #e94560; }
    #log {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.6;
    }
    .entry {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 4px;
      margin-bottom: 6px;
      overflow: hidden;
    }
    .entry-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 10px;
      background: #0f3460;
      cursor: pointer;
      user-select: none;
    }
    .entry-header:hover { background: #1a5276; }
    .entry-time { color: #888; font-size: 11px; }
    .entry-origin { color: #e94560; font-size: 11px; }
    .entry-type {
      font-weight: 600;
      color: #53c0f0;
      font-size: 12px;
    }
    .entry-body {
      padding: 8px 10px;
      white-space: pre-wrap;
      word-break: break-all;
      color: #b0c4de;
      display: none;
    }
    .entry.open .entry-body { display: block; }
    .empty-state {
      text-align: center;
      color: #555;
      margin-top: 60px;
      font-size: 13px;
    }
    .empty-state p { margin-top: 8px; }
    .count { font-size: 11px; color: #888; }
  </style>
</head>
<body>
  <header>
    <h1>PostMessage Viewer</h1>
    <div class="controls">
      <span class="status">
        <span class="dot listening" id="statusDot"></span>
        <span id="statusText">Listening</span>
      </span>
      <span class="count" id="countDisplay">0 events</span>
      <button id="subscribeBtn" title="Send MAX subscription registration">Subscribe to MAX</button>
      <button id="clearBtn">Clear</button>
      <button id="copyBtn">Copy All</button>
      <button id="autoScrollBtn" class="active">Auto-scroll</button>
    </div>
  </header>
  <div id="log">
    <div class="empty-state" id="emptyState">
      <div>📡</div>
      <p>Waiting for postMessage events...</p>
      <p>Embed this page as a custom workspace to see agent events.</p>
    </div>
  </div>

  <script>
    const log = document.getElementById('log');
    const emptyState = document.getElementById('emptyState');
    const countDisplay = document.getElementById('countDisplay');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    let autoScroll = true;
    let eventCount = 0;
    let allEvents = [];
    let subscribed = false;

    // ── MAX Subscription Registration ──
    // Sends a postMessage to the parent MAX window to subscribe
    // to agent session events. Adjust subscriptionTypes as needed.
    document.getElementById('subscribeBtn').addEventListener('click', () => {
      const registration = {
        issuer: 'PostMessageViewer',
        messageType: 'N/A',
        contactId: null,
        subscriptionTypes: [
          'AgentStateEvent',
          'ContactEvent',
          'AgentLegEvent',
          'AgentSessionStart',
          'AgentSessionEnd',
          'MchAgentSettingsChangeEvent',
          'CustomEvent'
        ]
      };

      try {
        window.parent.postMessage(JSON.stringify(registration), '*');
        subscribed = true;
        statusDot.className = 'dot subscribed';
        statusText.textContent = 'Subscribed';
        addLogEntry('→ SENT', 'self', 'Subscription registration sent to parent', registration);
      } catch (e) {
        addLogEntry('⚠ ERROR', 'self', 'Failed to send registration: ' + e.message, null);
      }
    });

    // ── Listen for all postMessage events ──
    window.addEventListener('message', (event) => {
      let parsed = null;
      let label = 'message';
      let raw = event.data;

      // Try to parse as JSON
      if (typeof raw === 'string') {
        try {
          parsed = JSON.parse(raw);
        } catch (e) {
          parsed = null;
        }
      } else if (typeof raw === 'object') {
        parsed = raw;
        raw = JSON.stringify(raw, null, 2);
      }

      // Try to extract a meaningful type label
      if (parsed) {
        if (parsed.messageType) {
          label = parsed.messageType;
        } else if (parsed.type) {
          label = parsed.type;
        } else if (parsed.events && Array.isArray(parsed.events) && parsed.events.length > 0) {
          const types = [...new Set(parsed.events.map(e => e.type || e.Type || 'unknown'))];
          label = types.join(', ');
        } else if (parsed.eventName) {
          label = 'CustomEvent: ' + parsed.eventName;
        }
      }

      addLogEntry(label, event.origin, raw, parsed);
    });

    // ── Render a log entry ──
    function addLogEntry(label, origin, raw, parsed) {
      emptyState.style.display = 'none';
      eventCount++;
      countDisplay.textContent = eventCount + ' event' + (eventCount !== 1 ? 's' : '');

      const now = new Date();
      const timestamp = now.toLocaleTimeString('en-US', { hour12: false }) +
        '.' + String(now.getMilliseconds()).padStart(3, '0');

      const formatted = parsed
        ? JSON.stringify(parsed, null, 2)
        : (typeof raw === 'string' ? raw : String(raw));

      allEvents.push({ timestamp, label, origin, data: formatted });

      const entry = document.createElement('div');
      entry.className = 'entry';
      entry.innerHTML = `
        <div class="entry-header">
          <span class="entry-type">${escapeHtml(label)}</span>
          <span>
            <span class="entry-origin">${escapeHtml(origin)}</span>
            <span class="entry-time">${timestamp}</span>
          </span>
        </div>
        <div class="entry-body">${escapeHtml(formatted)}</div>
      `;

      entry.querySelector('.entry-header').addEventListener('click', () => {
        entry.classList.toggle('open');
      });

      log.appendChild(entry);

      if (autoScroll) {
        log.scrollTop = log.scrollHeight;
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ── Controls ──
    document.getElementById('clearBtn').addEventListener('click', () => {
      log.innerHTML = '';
      emptyState.style.display = 'block';
      log.appendChild(emptyState);
      eventCount = 0;
      allEvents = [];
      countDisplay.textContent = '0 events';
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
      const text = allEvents.map(e =>
        `[${e.timestamp}] ${e.label} (${e.origin})\n${e.data}`
      ).join('\n\n---\n\n');
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy All', 1500);
      });
    });

    document.getElementById('autoScrollBtn').addEventListener('click', function () {
      autoScroll = !autoScroll;
      this.classList.toggle('active', autoScroll);
    });
  </script>
</body>
</html>
