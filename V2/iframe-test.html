<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADDI Widget - Iframe Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #1a1a2e;
            color: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 500;
        }

        .header-info {
            font-size: 12px;
            color: #aaa;
        }

        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .iframe-wrapper {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            overflow: hidden;
            width: 400px;
            height: 700px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>ADDI Widget - Iframe Test</h1>
        <span class="header-info">Genesys Voice Mode</span>
    </div>

    <div class="container">
        <div class="iframe-wrapper">
            <iframe
                src="http://addi-demo.ttec-cloudapps.com/web/genesys_voice?gc_region=usw2.pure.cloud&gc_clientId=de5fad2d-07fc-45f3-b6ba-867490bd9e7b&gc_redirectUrl=http://addi-demo.ttec-cloudapps.com/web/genesys_voice&gc_conversationId={{gcConversationId}}&gc_language={{gcLangTag}}&bearer=m-0ZcYkf3tsvXyfAQnv73WFPpLB4tBHynH7v4FNRxuTJSB"
                title="ADDI Translation Widget"
                allow="microphone"
            ></iframe>
        </div>
    </div>
</body>
</html>
